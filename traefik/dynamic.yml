http:
  # ── Routers ─────────────────────────────────────────────────────────
  routers:
    rpc:
      entryPoints: [rpc]
      rule: "Host(`rpc.tempo.local`)"
      service: rpc
      priority: 20

    faucet:
      entryPoints: [rpc]
      rule: "Host(`faucet.tempo.local`)"
      service: faucet
      priority: 20

    catchall:
      entryPoints: [rpc]
      rule: "PathPrefix(`/`)"
      service: rpc
      priority: 1

  # ── Services ────────────────────────────────────────────────────────
  services:
    rpc:
      # Traefik health-checks tempo-rpc-0-health / tempo-rpc-1-health
      # (the sidecars). Unhealthy backends are marked DOWN and excluded
      # from the pool automatically.
      # Actual RPC client traffic is routed to the REAL RPC nodes only.
      loadBalancer:
        healthCheck:
          path: /health
          interval: 10s
          timeout:  5s
          followRedirects: true
          headers:
            Host: ""
        servers:
          - url: "http://tempo-rpc-0:8545"
          - url: "http://tempo-rpc-1:8545"

    faucet:
      loadBalancer:
        servers:
          - url: "http://tempo-faucet:8545"
