http:
  # ── Routers ─────────────────────────────────────────────────────────
  routers:
    rpc:
      entryPoints: [rpc]
      rule: "Host(`rpc.tempo.local`)"
      service: rpc
      priority: 20

    faucet:
      entryPoints: [rpc]
      rule: "Host(`faucet.tempo.local`)"
      service: faucet
      priority: 20

    catchall:
      entryPoints: [rpc]
      rule: "PathPrefix(`/`)"
      service: rpc
      priority: 1

  # ── Services ────────────────────────────────────────────────────────
  services:
    rpc:
      loadBalancer:
        healthCheck:
          path: /health
          interval: 10s
          timeout:  5s
          followRedirects: true
          headers:
            Host: ""
        servers:
          - url: "http://tempo-rpc-0-health:8080"
          - url: "http://tempo-rpc-1-health:8080"

    faucet:
      loadBalancer:
        servers:
          - url: "http://tempo-faucet:8545"
