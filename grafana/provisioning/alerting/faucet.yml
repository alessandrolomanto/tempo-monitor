apiVersion: 1

groups:
  - orgId: 1
    name: faucet
    folder: Tempo Alerts
    interval: 30s
    rules:
      - uid: tempo-faucet-balance-low
        title: FaucetBalanceLow
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: eth_address_account_balance{name="faucet"}
              instant: true
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Faucet account balance critically low (pathUSD)
          description: >-
            The faucet account (0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266) pathUSD
            balance has dropped below 1 pathUSD (~1000 drips at the default FAUCET_AMOUNT
            of 0.001 pathUSD). The faucet genesis balance is ~18.44 pathUSD (~18,440 drips
            total capacity). Refund or restart the faucet. Metric is in whole pathUSD
            units (balanceOf / 1e18).
