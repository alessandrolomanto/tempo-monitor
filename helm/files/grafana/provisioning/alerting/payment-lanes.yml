apiVersion: 1

groups:
  - orgId: 1
    name: tempo-payment-lanes
    folder: Tempo Alerts
    interval: 10s
    rules:
      - uid: tempo-payment-lane-throughput-low
        title: PaymentLaneThroughputLow
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: rate(reth_tempo_payload_builder_payment_transactions_sum{job="tempo-execution"}[5m])
              instant: true
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [0.1]
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Payment Lane throughput below 0.1 tx/s
          description: >-
            Payment transaction rate has dropped below 0.1 tx/s for 5 minutes.
            This may indicate upstream lane configuration issues or missing
            lane traffic.

      - uid: tempo-consensus-metrics-unavailable
        title: ConsensusMetricsUnavailable
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: up{job="tempo-consensus"}
              instant: true
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
              refId: C
        noDataState: Alerting
        execErrState: Alerting
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Consensus metrics endpoint (:8001) unreachable
          description: >-
            The consensus metrics endpoint has been down for more than 1 minute.
            The consensus layer may have crashed or the port is unreachable.
      - uid: tempo-abnormal-block-finality
        title: AbnormalBlockFinality
        condition: F
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: reth_tempo_payload_builder_block_time_millis_last{job="tempo-execution"}
              instant: true
              refId: A
          - refId: B
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: avg_over_time(reth_tempo_payload_builder_block_time_millis_last{job="tempo-execution"}[10m])
              instant: true
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: C
          - refId: D
            datasourceUid: __expr__
            model:
              type: reduce
              expression: B
              reducer: last
              refId: D
          - refId: E
            datasourceUid: __expr__
            model:
              type: math
              expression: "$C / $D"
              refId: E
          - refId: F
            datasourceUid: __expr__
            model:
              type: threshold
              expression: E
              conditions:
                - evaluator:
                    type: gt
                    params: [2]
              refId: F
        noDataState: NoData
        execErrState: Error
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: Block time is abnormally high (> 2x rolling average)
          description: >-
            The latest block time exceeds twice the 10-minute average.
            Block production may be stalling due to payload finalization
            delays or state root computation pressure.

      - uid: tempo-txpool-congestion
        title: TxPoolCongestion
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: reth_transaction_pool_pending_pool_transactions{job="tempo-execution"}
              instant: true
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [10000]
              refId: C
        noDataState: NoData
        execErrState: Error
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Transaction pool congested (> 10,000 pending txs)
          description: >-
            The pending transaction pool has exceeded 10,000 entries for
            5 minutes. Block producers may not be draining the pool fast
            enough, or the node is receiving spam traffic.
