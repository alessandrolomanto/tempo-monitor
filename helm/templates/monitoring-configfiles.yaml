{{- $root := . }}
{{- $profile := .Values.profile }}
{{- if or (eq $profile "monitoring") (eq $profile "full") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tempo-monitor.fullname" $root }}-monitoring-config
  namespace: {{ $root.Release.Namespace }}
  labels:
    app.kubernetes.io/component: monitoring
    {{- include "tempo-monitor.labels" $root | nindent 4 }}
data:
  tempo.yaml: |
    stream_over_http_enabled: true
    server:
      http_listen_port: 3200
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
    metrics_generator:
      storage:
        path: /var/tempo/metrics
      traces_storage:
        path: /var/tempo/traces
      processor:
        service_graphs:
          dimensions:
            - service.name
        span_metrics:
          dimensions:
            - service.name
      registry:
        external_labels:
          source: tempo

  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      allow_structured_metadata: true

  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.monitoring.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.monitoring.prometheus.evaluationInterval }}

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "tempo-execution"
        static_configs:
          {{- range $i, $val := until (int .Values.validators.count) }}
          - targets: ["{{ include "tempo-monitor.fullname" $root }}-validator-{{ $val }}:{{ $root.Values.tempo.execution.metricsPort }}"]
            labels:
              instance: "validator-{{ $val }}"
              layer: execution
          {{- end }}
          {{- range $i, $rpc := until (int .Values.rpc.count) }}
          - targets: ["{{ include "tempo-monitor.fullname" $root }}-rpc-{{ $rpc }}:{{ $root.Values.tempo.execution.metricsPort }}"]
            labels:
              instance: "rpc-{{ $rpc }}"
              layer: execution
          {{- end }}
          - targets: ["{{ include "tempo-monitor.fullname" $root }}-faucet:{{ $root.Values.tempo.execution.metricsPort }}"]
            labels:
              instance: "faucet"
              layer: execution

      - job_name: "tempo-consensus"
        static_configs:
          {{- range $i, $val := until (int .Values.validators.count) }}
          - targets: ["{{ include "tempo-monitor.fullname" $root }}-validator-{{ $val }}:{{ $root.Values.tempo.consensus.metricsPort }}"]
            labels:
              instance: "validator-{{ $val }}"
              layer: consensus
          {{- end }}

      - job_name: "traefik"
        static_configs:
          - targets: ["{{ include "tempo-monitor.fullname" $root }}-traefik:{{ $root.Values.traefik.metricsPort }}"]

      - job_name: "alloy"
        static_configs:
          - targets: ["{{ include "tempo-monitor.fullname" $root }}-alloy:12345"]

{{- end }}{{/* end profile guard */}}
