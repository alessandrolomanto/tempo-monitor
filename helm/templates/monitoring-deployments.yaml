              containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki/loki.yaml
              subPath: loki.yaml
              readOnly: true
            {{- if .Values.monitoring.persistence.loki.enabled }}
            - name: data
              mountPath: /loki
            {{- end }}
          {{- with .Values.monitoring.loki.resources | default (dict) }}
          resources: {{ toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "tempo-monitor.fullname" $root }}-monitoring-config
        {{- if .Values.monitoring.persistence.loki.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "tempo-monitor.fullname" $root }}-loki
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}

---
# ── Pyroscope ────────────────────────────────────────────
{{- if .Values.monitoring.persistence.pyroscope.enabled }}
{{- $pvc := dict "enabled" true "name" (printf "%s-pyroscope" (include "tempo-monitor.fullname" .)) "component" "pyroscope" "storageClass" .Values.monitoring.persistence.pyroscope.storageClass "size" .Values.monitoring.persistence.pyroscope.size -}}
{{- include "tempo-monitor.pvc" (merge (dict "root" $root) $pvc) }}
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tempo-monitor.fullname" $root }}-pyroscope
  namespace: {{ $root.Release.Namespace }}
  labels:
    app.kubernetes.io/component: pyroscope
    {{- include "tempo-monitor.labels" $root | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: pyroscope
  template:
    metadata:
      labels:
        app.kubernetes.io/component: pyroscope
      {{- include "tempo-monitor.labels" $root | nindent 8 }}
    spec:
      containers:
        - name: pyroscope
          image: grafana/pyroscope:1.13.2
          ports:
            - name: http
              containerPort: 4040
          {{- if .Values.monitoring.persistence.pyroscope.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
          {{- with .Values.monitoring.pyroscope.resources }}
          resources: {{ toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.monitoring.persistence.pyroscope.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "tempo-monitor.fullname" $root }}-pyroscope
      {{- end }}

{{- end }}{{/* end profile guard */}}
