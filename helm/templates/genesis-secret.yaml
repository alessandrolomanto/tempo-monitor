{{- $root := . }}
{{- $profile := .Values.profile }}
{{- if or (eq $profile "consensus") (eq $profile "full") }}

# Secret containing the genesis.json file.
# You can provide your own pre-existing secret instead of embedding it here.
{{- if .Values.tempo.genesisExistingSecret }}
# genesis provided via external secret: {{ .Values.tempo.genesisExistingSecret }}
{{- else if .Values.tempo.genesis }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tempo-monitor.fullname" $root }}-genesis
  namespace: {{ $root.Release.Namespace }}
  labels:
    {{- include "tempo-monitor.labels" $root | nindent 4 }}
type: Opaque
data:
  genesis.json: {{ .Values.tempo.genesis | b64enc | nospace }}
{{- else if .Files.Get "genesis.json" }}
# genesis provided as file in the chart's consensus/ directory
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tempo-monitor.fullname" $root }}-genesis
  namespace: {{ $root.Release.Namespace }}
  labels:
    {{- include "tempo-monitor.labels" $root | nindent 4 }}
type: Opaque
data:
  genesis.json: {{ .Files.Get "genesis.json" | b64enc | nospace }}
{{- else }}
{{- fail "No genesis provided: set values.tempo.genesis or values.tempo.genesisExistingSecret or place consensus/genesis.json next to this chart" }}
{{- end }}

{{- end }}{{/* end profile guard */}}
